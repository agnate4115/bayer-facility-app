name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push Docker Image to Azure Container Registry
        run: |
          ACR_NAME="cac8d9625509acr"
          # Log into ACR
          az acr login -n $ACR_NAME
          # Build and Push
          IMAGE_NAME="$ACR_NAME.azurecr.io/bayer-backend:${{ github.sha }}"
          docker build -t $IMAGE_NAME ./backend
          docker push $IMAGE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          
          # Get ACR Password for Container App
          ACR_PASSWORD=$(az acr credential show -n $ACR_NAME --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASSWORD"
          echo "ACR_PASSWORD=$ACR_PASSWORD" >> $GITHUB_ENV

      - name: Deploy Backend to Azure Container Apps
        run: |
          az extension add --name containerapp --upgrade --yes || true
          az containerapp up \
            --name bayer-backend \
            --resource-group bayer-facility-rg \
            --environment bayer-env \
            --image ${{ env.IMAGE_NAME }} \
            --registry-server cac8d9625509acr.azurecr.io \
            --registry-username cac8d9625509acr \
            --registry-password ${{ env.ACR_PASSWORD }} \
            --target-port 8000 \
            --ingress external \
            --env-vars \
              AZURE_OPENAI_BASE_URL="${{ secrets.AZURE_OPENAI_BASE_URL }}" \
              AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
              AZURE_OPENAI_DEPLOYMENT_NAME="${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
              AZURE_OPENAI_API_VERSION="${{ secrets.AZURE_OPENAI_API_VERSION }}" \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              PGHOST="${{ secrets.PGHOST }}" \
              PGUSER="${{ secrets.PGUSER }}" \
              PGPORT="${{ secrets.PGPORT }}" \
              PGDATABASE="${{ secrets.PGDATABASE }}" \
              PGPASSWORD="${{ secrets.PGPASSWORD }}" \
              ENABLE_AZURE_INTEGRATION="False"

          # Get the HTTPS FQDN
          FQDN=$(az containerapp show --name bayer-backend --resource-group bayer-facility-rg --query properties.configuration.ingress.fqdn -o tsv)
          echo "Backend deployed at: https://$FQDN"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Backend URL
        id: backend
        run: |
          FQDN=$(az containerapp show --name bayer-backend --resource-group bayer-facility-rg --query properties.configuration.ingress.fqdn -o tsv)
          echo "backend_url=https://$FQDN" >> $GITHUB_OUTPUT

      - name: Build And Deploy Frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/app"
          api_location: ""
          output_location: "dist"
        env:
          VITE_API_URL: ${{ steps.backend.outputs.backend_url }}
