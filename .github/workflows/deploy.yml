name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$REPO_LOWER:backend-${{ github.sha }}"
          docker build -t $IMAGE_NAME ./backend
          docker push $IMAGE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create App Service Plan (if needed)
        run: |
          # Create Linux App Service Plan (B1 = lowest paid tier with container support)
          az appservice plan create \
            --name bayer-app-plan \
            --resource-group bayer-facility-rg \
            --sku B1 \
            --is-linux \
            2>/dev/null || echo "Plan already exists"

      - name: Create or Update Web App
        run: |
          # Check if web app exists
          APP_EXISTS=$(az webapp show --name bayer-backend-api --resource-group bayer-facility-rg --query "name" -o tsv 2>/dev/null || echo "")

          if [ -z "$APP_EXISTS" ]; then
            echo "Creating Web App with Docker container..."
            az webapp create \
              --name bayer-backend-api \
              --resource-group bayer-facility-rg \
              --plan bayer-app-plan \
              --deployment-container-image-name ${{ env.IMAGE_NAME }}
          fi

          # Configure the Docker registry credentials for GHCR
          az webapp config container set \
            --name bayer-backend-api \
            --resource-group bayer-facility-rg \
            --container-image-name ${{ env.IMAGE_NAME }} \
            --container-registry-url https://ghcr.io \
            --container-registry-user ${{ github.actor }} \
            --container-registry-password ${{ secrets.GITHUB_TOKEN }}

          # Set environment variables
          az webapp config appsettings set \
            --name bayer-backend-api \
            --resource-group bayer-facility-rg \
            --settings \
              AZURE_OPENAI_BASE_URL="${{ secrets.AZURE_OPENAI_BASE_URL }}" \
              AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
              AZURE_OPENAI_DEPLOYMENT_NAME="${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
              AZURE_OPENAI_API_VERSION="${{ secrets.AZURE_OPENAI_API_VERSION }}" \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              PGHOST="${{ secrets.PGHOST }}" \
              PGUSER="${{ secrets.PGUSER }}" \
              PGPORT="${{ secrets.PGPORT }}" \
              PGDATABASE="${{ secrets.PGDATABASE }}" \
              PGPASSWORD="${{ secrets.PGPASSWORD }}" \
              ENABLE_AZURE_INTEGRATION="False" \
              WEBSITES_PORT="8000"

          # Get the backend URL
          BACKEND_URL="https://bayer-backend-api.azurewebsites.net"
          echo "Backend deployed at: $BACKEND_URL"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision Static Web App & Get Token
        id: swa
        run: |
          az staticwebapp create -n bayer-frontend -g bayer-facility-rg -l eastus 2>/dev/null || true

          TOKEN=$(az staticwebapp secrets list -n bayer-frontend -g bayer-facility-rg --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "backend_url=https://bayer-backend-api.azurewebsites.net" >> $GITHUB_OUTPUT

      - name: Build And Deploy Frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/app"
          api_location: ""
          output_location: "dist"
        env:
          VITE_API_URL: ${{ steps.swa.outputs.backend_url }}
