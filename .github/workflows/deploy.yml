name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$REPO_LOWER:backend-${{ github.sha }}"
          docker build -t $IMAGE_NAME ./backend
          docker push $IMAGE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create or Update Container App
        run: |
          az extension add --name containerapp --upgrade --yes

          # Check if the container app environment exists
          ENV_EXISTS=$(az containerapp env show -n bayer-env -g bayer-facility-rg --query "name" -o tsv 2>/dev/null || echo "")

          if [ -z "$ENV_EXISTS" ]; then
            echo "Creating Container App Environment..."
            az containerapp env create \
              --name bayer-env \
              --resource-group bayer-facility-rg \
              --location eastus
          fi

          # Check if the container app exists
          APP_EXISTS=$(az containerapp show -n bayer-backend -g bayer-facility-rg --query "name" -o tsv 2>/dev/null || echo "")

          if [ -z "$APP_EXISTS" ]; then
            echo "Creating Container App..."
            az containerapp create \
              --name bayer-backend \
              --resource-group bayer-facility-rg \
              --environment bayer-env \
              --image ${{ env.IMAGE_NAME }} \
              --registry-server ghcr.io \
              --registry-username ${{ github.actor }} \
              --registry-password ${{ secrets.GITHUB_TOKEN }} \
              --ingress external \
              --target-port 8000 \
              --min-replicas 0 \
              --max-replicas 1 \
              --env-vars \
                "AZURE_OPENAI_BASE_URL=${{ secrets.AZURE_OPENAI_BASE_URL }}" \
                "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" \
                "AZURE_OPENAI_DEPLOYMENT_NAME=${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
                "AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}" \
                "AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
                "PGHOST=${{ secrets.PGHOST }}" \
                "PGUSER=${{ secrets.PGUSER }}" \
                "PGPORT=${{ secrets.PGPORT }}" \
                "PGDATABASE=${{ secrets.PGDATABASE }}" \
                "PGPASSWORD=${{ secrets.PGPASSWORD }}" \
                "ENABLE_AZURE_INTEGRATION=False"
          else
            echo "Updating existing Container App..."
            az containerapp update \
              --name bayer-backend \
              --resource-group bayer-facility-rg \
              --image ${{ env.IMAGE_NAME }} \
              --set-env-vars \
                "AZURE_OPENAI_BASE_URL=${{ secrets.AZURE_OPENAI_BASE_URL }}" \
                "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" \
                "AZURE_OPENAI_DEPLOYMENT_NAME=${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
                "AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}" \
                "AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
                "PGHOST=${{ secrets.PGHOST }}" \
                "PGUSER=${{ secrets.PGUSER }}" \
                "PGPORT=${{ secrets.PGPORT }}" \
                "PGDATABASE=${{ secrets.PGDATABASE }}" \
                "PGPASSWORD=${{ secrets.PGPASSWORD }}" \
                "ENABLE_AZURE_INTEGRATION=False"
          fi

          # Output the backend FQDN
          BACKEND_FQDN=$(az containerapp show -n bayer-backend -g bayer-facility-rg --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Backend deployed at: https://$BACKEND_FQDN"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision Static Web App & Get Token
        id: swa
        run: |
          az staticwebapp create -n bayer-frontend -g bayer-facility-rg -l eastus 2>/dev/null || true

          TOKEN=$(az staticwebapp secrets list -n bayer-frontend -g bayer-facility-rg --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

          az extension add --name containerapp --upgrade --yes
          BACKEND_URL="https://$(az containerapp show -n bayer-backend -g bayer-facility-rg --query 'properties.configuration.ingress.fqdn' -o tsv)"
          echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Build And Deploy Frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/app"
          api_location: ""
          output_location: "dist"
        env:
          VITE_API_URL: ${{ steps.swa.outputs.backend_url }}
