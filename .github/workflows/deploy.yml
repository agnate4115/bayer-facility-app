name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$REPO_LOWER:backend-${{ github.sha }}"
          docker build -t $IMAGE_NAME ./backend
          docker push $IMAGE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend to Azure Container Instances
        run: |
          # Delete existing container if it exists (to update)
          # We use set +e because az container delete has a known bug in recent CLI versions 
          # where it crashes with "invalid status 'OK'" even when successful
          set +e
          az container delete \
            --name bayer-backend \
            --resource-group bayer-facility-rg \
            --yes
          set -e

          # Create container instance with GHCR image
          az container create \
            --name bayer-backend \
            --resource-group bayer-facility-rg \
            --location eastus \
            --image ${{ env.IMAGE_NAME }} \
            --registry-login-server ghcr.io \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.GITHUB_TOKEN }} \
            --cpu 0.5 \
            --memory 1.0 \
            --ports 8000 \
            --ip-address Public \
            --dns-name-label bayer-backend-api \
            --os-type Linux \
            --environment-variables \
              AZURE_OPENAI_BASE_URL="${{ secrets.AZURE_OPENAI_BASE_URL }}" \
              AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
              AZURE_OPENAI_DEPLOYMENT_NAME="${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
              AZURE_OPENAI_API_VERSION="${{ secrets.AZURE_OPENAI_API_VERSION }}" \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              PGHOST="${{ secrets.PGHOST }}" \
              PGUSER="${{ secrets.PGUSER }}" \
              PGPORT="${{ secrets.PGPORT }}" \
              PGDATABASE="${{ secrets.PGDATABASE }}" \
              PGPASSWORD="${{ secrets.PGPASSWORD }}" \
              ENABLE_AZURE_INTEGRATION="False"

          # Get the public IP
          FQDN=$(az container show --name bayer-backend --resource-group bayer-facility-rg --query "ipAddress.fqdn" -o tsv)
          echo "Backend deployed at: http://$FQDN:8000"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Backend URL
        id: backend
        run: |
          FQDN=$(az container show --name bayer-backend --resource-group bayer-facility-rg --query "ipAddress.fqdn" -o tsv)
          echo "backend_url=http://$FQDN:8000" >> $GITHUB_OUTPUT

      - name: Build And Deploy Frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/app"
          api_location: ""
          output_location: "dist"
        env:
          VITE_API_URL: ${{ steps.backend.outputs.backend_url }}
